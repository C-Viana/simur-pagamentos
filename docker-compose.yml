services:
    mongo1:
        image: mongo:latest
        hostname: localhost
        container_name: mongo1
        ports:
            - "27018:27017"
        command: ["--replSet", "rs0", "--bind_ip_all"]
        volumes:
            - mongo1-data:/data/db
        networks:
            - mongo-cluster
        
    mongo-setup:
        image: mongo:latest
        container_name: mongo-setup
        depends_on: [mongo1]
        volumes:
            - ./init-mongo-replicaset.sh:/scripts/init-mongo-replicaset.sh
        entrypoint: ["bash", "/scripts/init-mongo-replicaset.sh"]
        networks:
            - mongo-cluster
        restart: "no"

    broker:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - "15672:15672"
            - "5672:5672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 40s
    
    glogal-acquirer:
        container_name: glogal-acquirer
        image: node:20
        ports:
            - 3000:3000
        volumes:
        - ./global-acquirer:/backend
        command: bash -c "cd backend && npm i && npm start"
        restart: on-failure
        depends_on:
            broker:
                condition: service_healthy

volumes:
    rabbitmq_data:
    mongo1-data:
        driver: local

networks:
    mongo-cluster:
        driver: bridge